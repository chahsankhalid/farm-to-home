---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-engine
spec:
  template:
    spec:
      containers:
        - name: insight-engine
          env:
            - name: FRAUDIO_GCP_REGION
              value: asia-south1
            - name: INSIGHT_ENGINE_FRAUDIO_KAFKA_SERVERS
              value: kafka-asia-south1-fraudio-prd-gcp-asia-south1.i.aivencloud.com:26651
            - name: INSIGHT_ENGINE_FRAUDIO_KAFKA_SCHEMA_REGISTRY_URL
              value: https://{user}:{pw}@kafka-asia-south1-fraudio-prd-gcp-asia-south1.i.aivencloud.com:26654