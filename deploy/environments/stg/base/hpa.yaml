---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: insight-engine
  labels:
    app.kubernetes.io/component: insight-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: insight-engine
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
